security: []

tags:
  - Auth
summary: Send reset password email
operationId: postSendResetEmail
description: >
  Sends a password reset email to the user.  
  Requires a valid email in the request body.
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - email
        properties:
          email:
            type: string
            format: email
            example: test@ukr.net
responses:
  '200':
    description: Reset password email has been successfully sent
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Reset password email has been successfully sent.
            data:
              type: object
              description: Empty object
              example: {}
  '404':
    description: User not found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: User not found!
  '500':
    description: Failed to send email
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 500
            message:
              type: string
              example: Failed to send the email, please try again later.
