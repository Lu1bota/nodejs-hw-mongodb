security: []

tags:
  - Auth
summary: Reset user password
operationId: postResetPassword
description: >
  Resets a user's password using a valid reset token.  
  Requires `token` from reset email and new `password` in request body.
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - token
          - password
        properties:
          token:
            type: string
            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJlbWFpbCI6ImRhbmlpbC5seXVib3RhQHVrci5uZXQiLCJpYXQiOjE3NTcwODQyNjIsImV4cCI6MTc1NzA4NDU2Mn0.DunOPlVMRqMrPmXNCJU9Q_kflzN8kw2dQzSmC2v6uSY
          password:
            type: string
            format: password
            example: test86
responses:
  '200':
    description: Password has been successfully reset
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Password has been successfully reset.
            data:
              type: object
              description: Empty object
              example: {}
  '401':
    description: Token is expired or invalid
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: Token is expired or invalid.
  '404':
    description: User not found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: User not found!
  '500':
    description: Internal server error
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 500
            message:
              type: string
              example: Failed to reset password, please try again later.
