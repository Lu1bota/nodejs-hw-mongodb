security: [] # цей ендпоінт доступний без авторизації

tags:
  - Auth
summary: Login user
operationId: postLogin
description: Authenticates user and returns access token.
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - email
          - password
        properties:
          email:
            type: string
            format: email
            example: test66@hmail.com
          password:
            type: string
            format: password
            example: test66
responses:
  '200':
    description: Successfully logged in a user
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully logged in a user!
            data:
              type: object
              properties:
                accessToken:
                  type: string
                  example: 42nQNsEFHVi7pycOsmODtwLXLl90Q8ihGldqub+/
  '400':
    description: Validation error
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 400
            message:
              type: string
              example: 'Invalid email or password'
  '401':
    description: Unauthorized - session not found or already expired
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: Session not found or expired
