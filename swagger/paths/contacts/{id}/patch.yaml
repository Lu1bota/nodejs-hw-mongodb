#/swagger/paths/contacts/patch.yaml

tags:
  - Contacts
summary: Update contact
operationId: updateContact
description: 'Update contact by id with payload'
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    description: "Contact's id"
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            description: "Contact's name"
            type: string
            minLength: 3
            maxLength: 20
            example: 'John Doe'
          phoneNumber:
            description: "Contact's phone number"
            type: string
            minLength: 3
            maxLength: 20
            example: '3800000000001'
          email:
            description: "Contact's email"
            type: string
            format: email
            example: dmytro3@example.com
          isFavourite:
            description: "Contact's favourite flag"
            type: boolean
            default: false
            example: true
          contactType:
            description: "Contact's type"
            type: string
            enum: ['work', 'home', 'personal']
            default: personal
            example: work
          photo:
            description: "Contact's photo"
            type: string
            format: binary
responses:
  '200':
    description: Successfully updated a contact
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully updated a contact!
            data:
              $ref: '../../../components/schemas/contact.yaml'
  '404':
    $ref: '../../../components/responses/404.yaml'
